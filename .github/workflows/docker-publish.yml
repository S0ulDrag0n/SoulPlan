name: Docker Image

# Builds a linux/amd64 image and pushes to GHCR.
# - Push to master           -> tags: :sha-<short>, :latest
# - Push of v0.1* git tag    -> tags: :sha-<short>, :v0.1, :latest
# - Manual dispatch          -> tags: :sha-<short>
#
# Why amd64 only:
# Next.js + Tailwind pulls native binaries (lightningcss, @tailwindcss/oxide)
# that have separate builds per (arch, libc). Multi-arch Docker builds need
# both archs' binaries in the lockfile, which causes npm to refuse installing
# the wrong-arch one. Running linux/amd64 in Docker Desktop on macOS/Windows
# works transparently via the host's x86 emulation, so amd64 covers all
# desktop platforms and Linux servers.
#
# First-time setup: GHCR packages start PRIVATE. To make public:
#   GitHub -> your profile -> Packages -> soulplan -> Package settings
#   -> Change visibility -> Public
#
# Storage and bandwidth for PUBLIC packages on GHCR are free.

on:
  push:
    branches: [master]
    tags: ["v0.1*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # S0ulDrag0n/SoulPlan -> ghcr.io/S0ulDrag0n/SoulPlan

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short
            type=match,pattern=v(0\.1\..+),group=1
            type=match,pattern=v(0\.1\..+)
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=SoulPlan
            org.opencontainers.image.description=Personal planning app
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.licence=MIT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ github.workflow }}-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}-${{ github.ref_name }}
